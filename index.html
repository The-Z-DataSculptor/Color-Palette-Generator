<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Color Generator</title>
    <link rel="stylesheet" href="Color.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="main-wrapper">
      <h1>Color Palette Generator</h1>

      <div id="palette-container">
        <div class="color-card">
          <div class="rect" id="rect-0"></div>
          <div class="color-info">
            <span class="hex-text" id="hex-0">#FFFFFF</span>
            <button class="copy-btn" onclick="copyToClipboard(0)">📋</button>
          </div>
        </div>

        <div class="color-card">
          <div class="rect" id="rect-1"></div>
          <div class="color-info">
            <span class="hex-text" id="hex-1">#FFFFFF</span>
            <button class="copy-btn" onclick="copyToClipboard(1)">📋</button>
          </div>
        </div>

        <div class="color-card">
          <div class="rect" id="rect-2"></div>
          <div class="color-info">
            <span class="hex-text" id="hex-2">#FFFFFF</span>
            <button class="copy-btn" onclick="copyToClipboard(2)">📋</button>
          </div>
        </div>

        <div class="color-card">
          <div class="rect" id="rect-3"></div>
          <div class="color-info">
            <span class="hex-text" id="hex-3">#FFFFFF</span>
            <button class="copy-btn" onclick="copyToClipboard(3)">📋</button>
          </div>
        </div>

        <div class="color-card">
          <div class="rect" id="rect-4"></div>
          <div class="color-info">
            <span class="hex-text" id="hex-4">#FFFFFF</span>
            <button class="copy-btn" onclick="copyToClipboard(4)">📋</button>
          </div>
        </div>
      </div>
      <button id="generate-btn">Generate New Color</button>
    </div>
    <script src="Color.js"></script>
  </body>
</html>
